<!DOCTYPE html>
<html>

<head>
    <title>Restaurant Voice Assistant</title>
</head>

<body>

    <h2>🎤 Restaurant Voice Assistant</h2>

    <button onclick="startListening()">Speak Order</button>

    <p id="speech"></p>
    <pre id="result"></pre>

    <script>

        const recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.lang = "en-IN";
        let currentOrder = null;

        function startListening() {
            recognition.start();
        }

        recognition.onresult = async (event) => {

            const text = event.results[0][0].transcript.toLowerCase();

            document.getElementById("speech").innerText = "You said: " + text;

            const confirmationWords = ["yes", "yeah", "yep", "sure", "ok", "okay"];

            const isConfirm = confirmationWords.some(word => text.includes(word));

            // HANDLE UPSELL RESPONSE FIRST
            if (currentOrder && isConfirm) {

                recognition.stop();

                currentOrder.items.push({
                    name: "Garlic Bread",
                    quantity: 1,
                    addons: []
                });

                speak("Great! I have added garlic bread to your order.");

                document.getElementById("result").innerText =
                    JSON.stringify(currentOrder, null, 2);

                return;
            }

            // OTHERWISE PROCESS NEW ORDER
            const response = await fetch("http://localhost:3002/parse-order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text })
            });

            const data = await response.json();

            currentOrder = data.order;

            const items = data.order.items.map(
                item => `${item.quantity} ${item.name}`
            ).join(", ");

            let message = `You ordered ${items}.`;

            if (data.upsell) {
                message += " " + data.upsell;
            }

            speak(message);

            document.getElementById("result").innerText =
                JSON.stringify(data, null, 2);
        };

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = "en-IN";

            msg.onend = () => {
                recognition.start();   // restart listening after AI finishes speaking
            };

            speechSynthesis.speak(msg);
        }

    </script>

</body>

</html>
