<!DOCTYPE html>
<html>

<head>
    <title>Restaurant Voice Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        h2 {
            font-size: 28px;
            margin-bottom: 20px;
            color: #e94560;
        }

        /* Status indicator */
        #status {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 15px;
            min-height: 24px;
        }

        #status.listening {
            color: #4ecca3;
        }

        #status.processing {
            color: #f0c040;
        }

        #status.speaking {
            color: #e94560;
        }

        /* Mic button */
        #micBtn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: #e94560;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        #micBtn:hover {
            transform: scale(1.1);
        }

        #micBtn.active {
            background: #4ecca3;
            animation: pulse 1.5s infinite;
            box-shadow: 0 4px 15px rgba(78, 204, 163, 0.5);
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(78, 204, 163, 0.5);
            }

            70% {
                box-shadow: 0 0 0 20px rgba(78, 204, 163, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(78, 204, 163, 0);
            }
        }

        /* Speech bubble */
        #speech {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 15px;
            min-height: 44px;
            width: 100%;
            max-width: 500px;
            font-size: 15px;
            color: #ccc;
        }

        /* AI message */
        #aiMessage {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 20px;
            min-height: 44px;
            width: 100%;
            max-width: 500px;
            font-size: 15px;
            color: #fff;
        }

        /* Order list */
        #orderSection {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 15px 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 15px;
        }

        #orderSection h3 {
            color: #4ecca3;
            font-size: 18px;
            margin-bottom: 10px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 8px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
        }

        .order-item .name {
            color: #eee;
        }

        .order-item .qty {
            color: #4ecca3;
            font-weight: bold;
        }

        .order-item .price {
            color: #f0c040;
        }

        .combo-tag {
            background: #e94560;
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            margin-left: 6px;
        }

        #emptyOrder {
            color: #666;
            font-style: italic;
            font-size: 14px;
        }

        /* Debug area */
        #debugToggle {
            color: #555;
            font-size: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        #result {
            display: none;
            background: #111;
            color: #4ecca3;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h2>🎤 Restaurant Voice Assistant</h2>

    <div id="status">Press the mic button to start ordering</div>

    <button id="micBtn" onclick="startListening()">🎙️</button>

    <div id="speech">Your speech will appear here...</div>
    <div id="aiMessage">AI response will appear here...</div>

    <!-- Order List Display -->
    <div id="orderSection">
        <h3>📋 Your Order</h3>
        <div id="orderList">
            <div id="emptyOrder">No items yet — start ordering!</div>
        </div>
    </div>

    <div id="debugToggle" onclick="toggleDebug()">▶ Show debug info</div>
    <pre id="result"></pre>

    <script>

        let sessionId = localStorage.getItem("sessionId");

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("sessionId", sessionId);
        }

        const recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.lang = "en-IN";

        let currentOrder = null;
        let aiSpeaking = false;
        let micActive = false;

        const statusEl = document.getElementById("status");
        const micBtn = document.getElementById("micBtn");


        // ========================
        // STATUS HELPERS
        // ========================

        function setStatus(text, cls) {
            statusEl.textContent = text;
            statusEl.className = cls || "";
        }


        // ========================
        // ORDER LIST DISPLAY
        // ========================

        function renderOrderList(order) {
            const listEl = document.getElementById("orderList");

            if (!order) {
                listEl.innerHTML = '<div id="emptyOrder">No items yet — start ordering!</div>';
                return;
            }

            const items = order.items || [];
            const combos = order.combos || [];

            if (items.length === 0 && combos.length === 0) {
                listEl.innerHTML = '<div id="emptyOrder">No items yet — start ordering!</div>';
                return;
            }

            let html = "";

            for (const item of items) {
                const price = item.base_price ? `₹${(item.base_price * item.quantity).toFixed(0)}` : "";
                html += `<div class="order-item">
                    <span class="name">${item.name}</span>
                    <span class="qty">x${item.quantity}</span>
                    <span class="price">${price}</span>
                </div>`;
            }

            for (const combo of combos) {
                const price = combo.combo_price ? `₹${(combo.combo_price * combo.quantity).toFixed(0)}` : "";
                html += `<div class="order-item">
                    <span class="name">${combo.combo_name} <span class="combo-tag">COMBO</span></span>
                    <span class="qty">x${combo.quantity}</span>
                    <span class="price">${price}</span>
                </div>`;
            }

            listEl.innerHTML = html;
        }


        // ========================
        // DEBUG TOGGLE
        // ========================

        function toggleDebug() {
            const r = document.getElementById("result");
            const t = document.getElementById("debugToggle");
            if (r.style.display === "none") {
                r.style.display = "block";
                t.textContent = "▼ Hide debug info";
            } else {
                r.style.display = "none";
                t.textContent = "▶ Show debug info";
            }
        }


        // ========================
        // MIC EVENTS
        // ========================

        recognition.onstart = () => {
            micActive = true;
            micBtn.classList.add("active");
            setStatus("🎤 Listening...", "listening");
        };

        recognition.onend = () => {
            micActive = false;
            micBtn.classList.remove("active");
            if (!aiSpeaking) {
                setStatus("Mic stopped", "");
            }
        };

        recognition.onerror = (e) => {
            console.log("Speech error:", e.error);
            setStatus("Speech error: " + e.error, "");
        };


        // ========================
        // START MIC
        // ========================

        function startListening() {

            if (micActive || aiSpeaking) return;

            try {
                recognition.start();
            }
            catch (e) {
                console.log("Mic already running");
            }

        }


        // ========================
        // SPEECH RESULT — ALL logic handled by backend
        // ========================

        recognition.onresult = async (event) => {

            if (aiSpeaking) return;

            const text = event.results[0][0].transcript.toLowerCase();

            document.getElementById("speech").innerText = "🗣️ You said: " + text;
            setStatus("⏳ Processing...", "processing");

            try {

                const response = await fetch("http://localhost:3002/parse-order", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        sessionId,
                        text
                    })

                });

                const data = await response.json();

                console.log("Backend response:", data);

                // Update debug view
                document.getElementById("result").innerText =
                    JSON.stringify(data, null, 2);


                // Mark order complete
                if (data.completed) {
                    window.orderCompleted = true;
                }

                // Update order display if present
                if (data.order) {
                    currentOrder = data.order;
                    renderOrderList(currentOrder);
                }

                // If order is completed, clear the order display  
                if (data.completed) {
                    renderOrderList(null);
                }


                // Determine what to speak
                let message = "";

                if (data.clarification) {
                    message = data.clarification;
                } else if (data.message) {
                    message = data.message;
                } else {
                    message = "I'm not sure what you said. Could you try again?";
                }

                // Show AI response in message box
                document.getElementById("aiMessage").innerText = "🤖 " + message;

                // Speak the message
                speak(message);

            } catch (err) {
                console.error("Fetch error:", err);
                setStatus("❌ Connection error", "");
                document.getElementById("aiMessage").innerText = "❌ Could not connect to server.";
                speak("Sorry, there was an error connecting to the server. Please try again.");
            }

        };



        // ========================
        // SARVAM TTS SPEAK
        // ========================

        async function speak(text) {

            aiSpeaking = true;
            setStatus("🔊 Speaking...", "speaking");

            if (micActive) {
                recognition.stop();
            }

            try {

                const response = await fetch("http://localhost:3002/tts", {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({ text })

                });

                const data = await response.json();

                if (!data.audio) {
                    console.error("TTS returned no audio, falling back to browser speech");
                    fallbackSpeak(text);
                    return;
                }

                const audio = new Audio(`data:audio/wav;base64,${data.audio}`);

                audio.play();

                audio.onended = () => {
                    onSpeechDone();
                };

                audio.onerror = () => {
                    console.error("Audio playback error, falling back to browser speech");
                    fallbackSpeak(text);
                };

            } catch (err) {
                console.error("TTS fetch error:", err);
                fallbackSpeak(text);
            }

        }


        // ========================
        // BROWSER FALLBACK TTS
        // ========================

        function fallbackSpeak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "en-IN";
            utterance.onend = () => {
                onSpeechDone();
            };
            speechSynthesis.speak(utterance);
        }


        // ========================
        // AFTER SPEAKING — auto-restart mic
        // ========================

        function onSpeechDone() {
            aiSpeaking = false;

            if (window.orderCompleted) {
                setStatus("✅ Order placed! Refresh to start a new order.", "");
                return;
            }

            setStatus("Ready — press mic or wait...", "");

            setTimeout(() => {
                startListening();
            }, 500);
        }

    </script>

</body>

</html>
